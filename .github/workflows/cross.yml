name: Build (cross)

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  mingw:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cross: [i686-w64-mingw32, x86_64-w64-mingw32]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install MinGW-w64
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64 binutils-mingw-w64
      - name: Build
        run: make -C mingw CROSS=${{ matrix.cross }} static shared

  djgpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up DJGPP
        run: |
          sudo apt-get update && sudo apt-get install -y libfl2
          curl -sL https://github.com/andrewwutw/build-djgpp/releases/download/v3.4/djgpp-linux64-gcc1220.tar.bz2 -o /tmp/djgpp.tar.bz2
          echo "8464f17017d6ab1b2bb2df4ed82357b5bf692e6e2b7fee37e315638f3d505f00  /tmp/djgpp.tar.bz2" | sha256sum -c -
          sudo tar xj -C /opt -f /tmp/djgpp.tar.bz2
      - name: Build
        run: |
          export PATH=/opt/djgpp/i586-pc-msdosdjgpp/bin:/opt/djgpp/bin:$PATH
          make -C djgpp CROSS=i586-pc-msdosdjgpp USE_DXE=0

  amiga-m68k:
    runs-on: ubuntu-latest
    container: amigadev/crosstools:m68k-amigaos
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Build library
        # ponytail: library only; player links fail on cexp (clib2 libm gap). Upgrade path: fix Amiga reverb or clib2.
        run: make -C amiga libWildMidi.a AOS3=1 CROSS=m68k-amigaos

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Build with NDK
        run: |
          ${ANDROID_NDK_LATEST_HOME}/ndk-build -C android \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=jni/Android.mk \
            NDK_APPLICATION_MK=jni/Application.mk

  os2-emx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Setup cross-os2emx
        uses: komh/setup-cross-os2emx@v1
        with:
          platform: linux-x64
      - name: Build
        run: |
          make -C os2 -f makefile.emx CROSS=i686-pc-os2-emx
      - name: distclean
        run: |
          make -C os2 -f makefile.emx distclean
