name: Build (Open Watcom)

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  os2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: open-watcom/setup-watcom@v0
      - name: Build library and player
        run: |
          cd os2 && wmake -f makefile.wat
          cd ..
      - name: distclean
        run: |
          cd os2 && wmake -f makefile.wat distclean
          cd ..

  windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: open-watcom/setup-watcom@v0
      - name: Build library and player
        run: |
          cd win32wat && wmake
          cd ..
      - name: distclean
        run: |
          cd win32wat && wmake distclean
          cd ..
